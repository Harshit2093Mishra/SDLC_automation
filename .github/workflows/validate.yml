name: Validate C++ Build and Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build cmake g++ python3

      - name: Build and run existing tests
        run: bash unit_test_automation/scripts/validate.sh

      - name: Show changed C++ files (PR only)
        if: github.event_name == 'pull_request'
        run: |
          python3 -m unit_test_automation \
            --base origin/${{ github.base_ref }} \
            --head HEAD \
            --skip-build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate and run unit tests for MR
        if: github.event_name == 'pull_request'
        run: |
          python3 -m unit_test_automation \
            --base origin/${{ github.base_ref }} \
            --head HEAD
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
