name: Validate C++ Build and Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ninja-build cmake g++

      - name: Run validation
        run: |
          bash unit_test_automation/scripts/validate.sh

      - name: Collect changed C++ files (PR only)
        if: github.event_name == 'pull_request'
        run: |
          python3 unit_test_automation/scripts/collect_pr_diff.py --base origin/${{ github.base_ref }} --head HEAD --pretty
